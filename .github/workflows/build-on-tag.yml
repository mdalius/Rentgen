name: Build on Tag

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      docker_tag:
        description: 'Image tag to use (e.g. test, dev-mintaras). Not "latest".'
        required: true
        default: 'test'
      push_image:
        description: 'Push to GHCR? Uncheck to just verify the build.'
        type: boolean
        default: false

jobs:
  build:
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
          - os: ubuntu-latest
            arch: arm64
          - os: windows-latest
            arch: x64
          - os: windows-11-arm
            arch: arm64
          - os: macos-latest
            arch: arm64
          - os: macos-latest
            arch: x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Import Apple Developer ID cert (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_CERT_P12_B64: ${{ secrets.MACOS_CERT_P12_B64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          echo "$MACOS_CERT_P12_B64" | base64 --decode > certificate.p12

          security create-keychain -p "temp_pass" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "temp_pass" build.keychain

          security import certificate.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -A

          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_pass" build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain

          IDENTITY=$(security find-identity -v -p codesigning build.keychain \
            | grep "Developer ID Application" \
            | head -1 \
            | sed -E 's/.*"(Developer ID Application: [^"]+)".*/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "Could not extract Developer ID Application identity from keychain"
            exit 1
          fi
          echo "Found signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Build installers
        run: npm run make -- --arch=${{ matrix.arch }}

      - name: Notarize + staple DMG (macOS)
        if: startsWith(matrix.os, 'macos')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e

          echo "Looking for DMG..."
          DMG_PATH=$(find out/make -name "*.dmg" -print -quit)
          if [ -z "$DMG_PATH" ]; then
            echo "No DMG found under out/make"
            exit 1
          fi

          echo "Codesigning DMG..."
          codesign --force --sign "Developer ID Application" "$DMG_PATH"

          echo "Verifying codesign..."
          codesign -dv --verbose=4 "$DMG_PATH"

          echo "Submitting for notarization..."
          SUBMISSION_ID=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --output-format json \
            --wait | jq -r '.id')

          echo "Getting notarization log..."
          xcrun notarytool log "$SUBMISSION_ID" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" || true

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"

          echo "Verifying notarization..."
          spctl --assess --type open --context context:primary-signature -vv "$DMG_PATH"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Rentgen-installers-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            out/make/**
          retention-days: 30

  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download installer artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: Rentgen-installers-*

      - name: Extract tag name
        id: tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Fetch all tags
        run: git fetch --tags

      - name: Generate release notes from CHANGELOG
        id: release_notes
        run: |
          TAG_NAME="${{ steps.tag.outputs.TAG_NAME }}"

          # Check if CHANGELOG.md exists
          if [ ! -f "CHANGELOG.md" ]; then
            echo "CHANGELOG.md not found, falling back to git commits"
            # Fallback to git commits
            git tag --sort=-version:refname > /tmp/all_tags.txt
            PREVIOUS_TAG=""
            while IFS= read -r tag; do
              if [ "$tag" != "$TAG_NAME" ]; then
                PREVIOUS_TAG="$tag"
                break
              fi
            done < /tmp/all_tags.txt

            if [ -z "$PREVIOUS_TAG" ]; then
              NOTES=$(git log ${TAG_NAME} --pretty=format:"- %s (%h)" --no-merges)
              COMPARE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
            else
              NOTES=$(git log ${PREVIOUS_TAG}..${TAG_NAME} --pretty=format:"- %s (%h)" --no-merges)
              COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
            fi

            if [ -z "$NOTES" ]; then
              NOTES="No changes found"
            fi

            {
              echo "## What's Changed"
              echo ""
              echo "$NOTES"
              echo ""
              echo "**Full Changelog**: $COMPARE_URL"
            } > release_notes.md
            exit 0
          fi

          # Extract changelog entry for this version
          # Look for lines starting with ## [TAG_NAME] (e.g., ## [v1.2.0.9])
          CHANGELOG_ENTRY=""
          IN_SECTION=false

          # Escape special characters in tag for regex
          ESCAPED_TAG=$(echo "$TAG_NAME" | sed 's/\./\\./g')

          while IFS= read -r line || [ -n "$line" ]; do
            # Check if this is the start of our version section
            # Match pattern like: ## [v1.2.0.9] or ## [TAG_NAME]
            if echo "$line" | grep -qE "^## \[${ESCAPED_TAG}\]"; then
              IN_SECTION=true
              # Skip the header line itself, we'll use the content below
              continue
            fi

            # If we're in our section and hit another version header, stop
            if [ "$IN_SECTION" = true ]; then
              if echo "$line" | grep -qE "^## \["; then
                break
              fi
              # Add the line to our entry
              CHANGELOG_ENTRY="${CHANGELOG_ENTRY}${line}"$'\n'
            fi
          done < CHANGELOG.md

          # Trim trailing newlines and whitespace
          CHANGELOG_ENTRY=$(echo -n "$CHANGELOG_ENTRY" | sed -e :a -e '/^\n*$/{$d;N;ba' -e '}' | sed 's/[[:space:]]*$//')

          # Get previous tag for compare URL
          git tag --sort=-version:refname > /tmp/all_tags.txt
          PREVIOUS_TAG=""
          while IFS= read -r tag; do
            if [ "$tag" != "$TAG_NAME" ]; then
              PREVIOUS_TAG="$tag"
              break
            fi
          done < /tmp/all_tags.txt

          if [ -z "$PREVIOUS_TAG" ]; then
            COMPARE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG_NAME}"
          else
            COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${TAG_NAME}"
          fi

          # If we found changelog entry, use it; otherwise fallback to git commits
          # Check if CHANGELOG_ENTRY has meaningful content (not just whitespace)
          if [ -n "$CHANGELOG_ENTRY" ] && [ "$(echo "$CHANGELOG_ENTRY" | tr -d '[:space:]')" != "" ]; then
            {
              echo "$CHANGELOG_ENTRY"
              echo ""
              echo "**Full Changelog**: $COMPARE_URL"
            } > release_notes.md
            echo "Successfully extracted changelog entry for ${TAG_NAME}"
          else
            echo "No changelog entry found for ${TAG_NAME}, falling back to git commits"
            # Fallback to git commits
            if [ -z "$PREVIOUS_TAG" ]; then
              NOTES=$(git log ${TAG_NAME} --pretty=format:"- %s (%h)" --no-merges)
            else
              NOTES=$(git log ${PREVIOUS_TAG}..${TAG_NAME} --pretty=format:"- %s (%h)" --no-merges)
            fi

            if [ -z "$NOTES" ]; then
              NOTES="No changes found"
            fi

            {
              echo "## What's Changed"
              echo ""
              echo "$NOTES"
              echo ""
              echo "**Full Changelog**: $COMPARE_URL"
            } > release_notes.md
          fi

      - name: Rename installer files with platform prefixes
        run: |
          TAG_NAME="${{ steps.tag.outputs.TAG_NAME }}"
          echo "Renaming installer files to format: Rentgen-${TAG_NAME}-platform-arch.extension"

          # Rename DMG files (macOS): Rentgen-VERSION-ARCH.dmg -> Rentgen-TAG_NAME-mac-ARCH.dmg
          find artifacts -type f -name "Rentgen-*.dmg" | while read file; do
            dir=$(dirname "$file")
            basename=$(basename "$file")
            # Extract arch from filename (e.g., Rentgen-1.2.1-x64.dmg -> x64)
            arch=$(echo "$basename" | sed -n 's/.*-\(x64\|arm64\)\.dmg$/\1/p')
            if [ -n "$arch" ]; then
              newname="Rentgen-${TAG_NAME}-mac-${arch}.dmg"
              mv "$file" "$dir/$newname"
              echo "Renamed: $basename -> $newname"
            fi
          done

          # Rename EXE files (Windows): Rentgen VERSION Setup.exe -> Rentgen-TAG_NAME-win-ARCH.exe
          find artifacts -type f -name "*.exe" | while read file; do
            dir=$(dirname "$file")
            basename=$(basename "$file")
            # Extract arch from directory path (artifacts/Rentgen-installers-windows-latest-x64/...)
            # or filename, default to x64
            arch="x64"
            if echo "$file" | grep -qi "arm64"; then
              arch="arm64"
            fi
            newname="Rentgen-${TAG_NAME}-win-${arch}.exe"
            mv "$file" "$dir/$newname"
            echo "Renamed: $basename -> $newname"
          done

          # Rename DEB files (Linux): rentgen_VERSION_ARCH.deb -> Rentgen-TAG_NAME-linux-ARCH.deb
          find artifacts -type f -name "rentgen_*.deb" | while read file; do
            dir=$(dirname "$file")
            basename=$(basename "$file")
            # Extract arch from filename (e.g., rentgen_1.2.1_amd64.deb -> amd64)
            arch=$(echo "$basename" | sed -n 's/.*_\(amd64\|arm64\)\.deb$/\1/p')
            if [ -n "$arch" ]; then
              # Convert amd64 to x64 for consistency
              if [ "$arch" = "amd64" ]; then
                arch="x64"
              fi
              newname="Rentgen-${TAG_NAME}-linux-${arch}.deb"
              mv "$file" "$dir/$newname"
              echo "Renamed: $basename -> $newname"
            fi
          done

          # Rename RPM files (Linux): rentgen-VERSION-REVISION.ARCH.rpm -> Rentgen-TAG_NAME-linux-ARCH.rpm
          find artifacts -type f -name "rentgen-*.rpm" | while read file; do
            dir=$(dirname "$file")
            basename=$(basename "$file")
            # Extract arch from filename (e.g., rentgen-1.2.1-1.x86_64.rpm -> x86_64)
            # RPM uses x86_64 for x64 and arm64 for ARM 64-bit
            arch=$(echo "$basename" | sed -n 's/.*\.\(x86_64\|arm64\)\.rpm$/\1/p')
            if [ -n "$arch" ]; then
              # Convert x86_64 to x64 for consistency
              if [ "$arch" = "x86_64" ]; then
                arch="x64"
              fi
              newname="Rentgen-${TAG_NAME}-linux-${arch}.rpm"
              mv "$file" "$dir/$newname"
              echo "Renamed: $basename -> $newname"
            fi
          done

          echo "File renaming complete!"

      - name: Prepare installer files
        run: |
          # Find and list only installer files
          echo "Searching for installer files..."
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.exe" -o \
            -name "*.deb" -o \
            -name "*.rpm" \
          \) > installer_files.txt || true

          if [ ! -s installer_files.txt ]; then
            echo "No installer files found! Listing artifacts directory:"
            find artifacts -type f | head -20
            exit 1
          fi

          echo "Found installer files:"
          cat installer_files.txt

          # Count files
          FILE_COUNT=$(wc -l < installer_files.txt)
          echo "Total installer files: $FILE_COUNT"

      - name: Delete existing release if present
        run: |
          TAG_NAME="${{ steps.tag.outputs.TAG_NAME }}"
          REPO="${{ github.repository }}"

          # Get release ID if it exists
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${TAG_NAME}" || echo "")

          RELEASE_ID=$(echo "$RESPONSE" | grep -o '"id":[0-9]*' | head -1 | cut -d':' -f2 || echo "")

          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing release ${TAG_NAME} (ID: ${RELEASE_ID})"
            curl -X DELETE \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${REPO}/releases/${RELEASE_ID}"
            echo "Release deleted successfully"
          else
            echo "No existing release found for ${TAG_NAME}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: Release ${{ steps.tag.outputs.TAG_NAME }}
          body_path: release_notes.md
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.deb
            artifacts/**/*.rpm
          fail_on_unmatched_files: false
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI bundle
        run: npm run build:cli:bundle

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/rentgen-io/rentgen-cli
          # Git tag of `v1.20.0` produces Docker tags `1.20.0`, `1.20`, and `latest`.
          # Manual dispatch uses inputs.docker_tag and does not touch `latest`.
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ inputs.docker_tag }},enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.push_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test pushed image (--version)
        if: github.event_name == 'push' || inputs.push_image
        run: |
          docker run --rm \
            ghcr.io/rentgen-io/rentgen-cli:${{ steps.meta.outputs.version }} \
            --version

      - name: Smoke test pushed image (run --help)
        if: github.event_name == 'push' || inputs.push_image
        run: |
          docker run --rm \
            ghcr.io/rentgen-io/rentgen-cli:${{ steps.meta.outputs.version }} \
            run --help

      - name: Confirm multi-arch manifest
        if: github.event_name == 'push' || inputs.push_image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/rentgen-io/rentgen-cli:${{ steps.meta.outputs.version }}
